<!DOCTYPE html><html lang="vi"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Hệ Thống Trắc Nghiệm Chuyên Nghiệp</title>    <style>        /* CSS Variables for Light/Dark Mode */        :root {            --bg-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); /* Aqua Light */            --glass-bg: rgba(255, 255, 255, 0.85);            --text-main: #2c3e50;            --text-muted: #555;            --grid-color: rgba(0, 0, 0, 0.07);            --primary-color: #007bff;            --hover-color: #0056b3;            --border-color: rgba(0, 0, 0, 0.1);            --correct-bg: #d4edda;            --correct-border: #28a745;            --wrong-bg: #f8d7da;            --wrong-border: #dc3545;            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);        }        [data-theme="dark"] {            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); /* Dark Blue */            --glass-bg: rgba(15, 25, 35, 0.85);            --text-main: #f8f9fa;            --text-muted: #ccc;            --grid-color: rgba(255, 255, 255, 0.05);            --primary-color: #4facfe;            --hover-color: #00f2fe;            --border-color: rgba(255, 255, 255, 0.1);            --correct-bg: rgba(40, 167, 69, 0.3);            --wrong-bg: rgba(220, 53, 69, 0.3);            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);        }        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }        body {            min-height: 100vh;            background: var(--bg-gradient);            color: var(--text-main);            display: flex;            justify-content: center;            align-items: center;            overflow-x: hidden;            transition: background 0.5s ease;        }        /* Animated Grid Background */        .grid-bg {            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;            background-image:                 linear-gradient(to right, var(--grid-color) 1px, transparent 1px),                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);            background-size: 40px 40px;            animation: moveGrid 3s linear infinite;            z-index: -1;        }        @keyframes moveGrid {            0% { background-position: 0 0; }            100% { background-position: 40px 40px; }        }        /* Container & Glassmorphism */        .app-container {            background: var(--glass-bg);            backdrop-filter: blur(12px);            -webkit-backdrop-filter: blur(12px);            border: 1px solid var(--border-color);            box-shadow: var(--shadow);            border-radius: 20px;            padding: 30px;            width: 100%;            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);            position: relative;            display: flex;            flex-direction: column;        }        /* Window Sizes */        .size-normal { max-width: 800px; min-height: 500px; }        .size-large { max-width: 1200px; min-height: 700px; }        .size-fullscreen {             max-width: 100%; height: 100vh; border-radius: 0; border: none;             display: flex; flex-direction: column; justify-content: center;        }        /* Top Controls (Theme & Timer) */        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }                .theme-switch {            background: transparent; border: 2px solid var(--primary-color);            color: var(--text-main); padding: 8px 15px; border-radius: 20px;            cursor: pointer; font-weight: bold; transition: 0.3s;        }        .theme-switch:hover { background: var(--primary-color); color: #fff; }        .timer { font-size: 1.5rem; font-weight: bold; color: #dc3545; }        [data-theme="dark"] .timer { color: #ff6b6b; }        /* Progress Bar */        .progress-container {            width: 100%; height: 8px; background: var(--border-color);            border-radius: 4px; margin-bottom: 25px; overflow: hidden;        }        .progress-bar {            height: 100%; background: var(--primary-color); width: 0%;            transition: width 0.5s ease-in-out;        }        /* Screens */        .screen { display: none; animation: fadeIn 0.4s ease-in-out; flex: 1; }        .screen.active { display: flex; flex-direction: column; }        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }        /* Setup Screen */        .setup-screen { text-align: center; justify-content: center; align-items: center; }        .setup-screen h1 { margin-bottom: 20px; font-size: 2.5rem; }        .size-options { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }                .btn {            padding: 12px 25px; border: none; border-radius: 8px; font-size: 1rem;            cursor: pointer; font-weight: bold; transition: all 0.2s;            background: var(--primary-color); color: #fff;        }        .btn:hover { background: var(--hover-color); transform: scale(1.05); }        .btn-outline { background: transparent; border: 2px solid var(--primary-color); color: var(--text-main); }        .btn-outline:hover { background: var(--primary-color); color: #fff; }        .btn-outline.selected { background: var(--primary-color); color: #fff; box-shadow: 0 0 15px var(--primary-color); }        .btn-large { font-size: 1.2rem; padding: 15px 40px; border-radius: 30px; }        /* Quiz Screen */        .question-header { font-size: 1.4rem; margin-bottom: 20px; font-weight: bold; line-height: 1.4; }        .options-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }                .option {            padding: 15px 20px; background: rgba(0,0,0,0.03); border: 2px solid var(--border-color);            border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 1.1rem; color: var(--text-main);            display: flex; align-items: center;        }        [data-theme="dark"] .option { background: rgba(255,255,255,0.05); }        .option:hover { border-color: var(--primary-color); transform: translateX(5px); }        .option.selected { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }        .navigation-btns { display: flex; justify-content: space-between; margin-top: auto; }        .btn-submit { background: #28a745; }        .btn-submit:hover { background: #218838; }        /* Review Screen */        .review-list { overflow-y: auto; max-height: 60vh; padding-right: 10px; margin-bottom: 20px; }        .review-item { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }        .review-item h3 { font-size: 1.1rem; margin-bottom: 10px; }        .review-option { padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid var(--border-color); }        .review-option.correct { background: var(--correct-bg); border-color: var(--correct-border); font-weight: bold;}        .review-option.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); }                /* Mobile adjustments */        @media (max-width: 600px) {            .app-container { padding: 20px; border-radius: 0; min-height: 100vh; border: none;}            .size-options { flex-direction: column; }            .navigation-btns { flex-direction: column; gap: 10px; }            .btn { width: 100%; }        }                /* Custom Scrollbar */        ::-webkit-scrollbar { width: 8px; }        ::-webkit-scrollbar-track { background: transparent; }        ::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }    </style></head><body>    <div class="grid-bg"></div>    <div class="app-container size-normal" id="app">        <div class="top-bar">            <button class="theme-switch" onclick="toggleTheme()">🌓 Đổi Giao Diện</button>            <div class="timer" id="timerDisplay" style="display: none;">15:00</div>        </div>        <div class="screen setup-screen active" id="setupScreen">            <h1>Hệ Thống Trắc Nghiệm</h1>            <p style="margin-bottom: 20px; color: var(--text-muted);">Vui lòng chọn kích thước hiển thị trước khi bắt đầu</p>            <div class="size-options">                <button class="btn btn-outline selected" onclick="selectSize('size-normal', this)">Kích thước thường (Normal)</button>                <button class="btn btn-outline" onclick="selectSize('size-large', this)">Rộng (Large)</button>                <button class="btn btn-outline" onclick="selectSize('size-fullscreen', this)">Toàn Màn Hình (Full-Screen)</button>            </div>            <button class="btn btn-large" onclick="startSystem()">🚀 Bắt Đầu Làm Bài</button>        </div>        <div class="screen" id="quizScreen">            <div class="progress-container">                <div class="progress-bar" id="progressBar"></div>            </div>            <div class="question-header" id="questionText">Đang tải câu hỏi...</div>            <div class="options-container" id="optionsContainer">                </div>            <div class="navigation-btns">                <button class="btn btn-outline" id="btnPrev" onclick="prevQuestion()" style="visibility: hidden;">&laquo; Câu trước</button>                <button class="btn btn-submit" id="btnSubmit" onclick="submitQuiz()" style="display: none;">Nộp Bài ✔</button>                <button class="btn" id="btnNext" onclick="nextQuestion()">Câu tiếp &raquo;</button>            </div>        </div>        <div class="screen setup-screen" id="resultScreen">            <h1>Hoàn Thành Bài Thi!</h1>            <h2 style="font-size: 3rem; color: var(--primary-color); margin: 20px 0;" id="scoreDisplay">0/20</h2>            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">                <button class="btn btn-large" onclick="showReview()">👀 Xem Lại Chi Tiết</button>                <button class="btn btn-large btn-outline" onclick="location.reload()">🔄 Làm Lại Từ Đầu</button>            </div>        </div>        <div class="screen" id="reviewScreen">            <h2 style="margin-bottom: 20px; text-align: center;">Đánh Giá Bài Làm</h2>            <div class="review-list" id="reviewList">                </div>            <button class="btn btn-large" onclick="location.reload()" style="width: 100%;">Thoát & Bắt Đầu Lại</button>        </div>    </div>    <script>        // Data source        const rawQuestions = [            { q: 'Chức năng chính của phần mềm làm video là gì?', o: ['A. Chỉ để xem các đoạn video có sẵn.', 'B. Dùng để quản lí các tệp tin trong máy tính.', 'C. Dùng để soạn thảo văn bản.', 'D. Tạo video từ các tệp hình ảnh, âm thanh và các đoạn video ngắn.'], a: 3 },            { q: 'Trong phần mềm Video Editor, khu vực nào dùng để chứa các tệp nguyên liệu đầu vào?', o: ['A. Project library.', 'B. Storyboard.', 'C. Preview.', 'D. Timeline.'], a: 0 },            { q: 'Đâu là thứ tự đúng của các bước cơ bản để tạo một video?', o: ['A. Xuất video -> Biên tập -> Chuẩn bị tài liệu.', 'B. Chuẩn bị tài liệu -> Biên tập -> Xuất video.', 'C. Biên tập -> Chuẩn bị tài liệu -> Xuất video.', 'D. Xuất video -> Chuẩn bị tài liệu -> Biên tập.'], a: 1 },            { q: '"Storyboard" trong phần mềm làm video được hiểu là gì?', o: ['A. Thư viện dự án.', 'B. Màn hình xem trước kết quả.', 'C. Bảng phân cảnh để sắp xếp thứ tự các hình ảnh, video.', 'D. Công cụ để cắt ghép âm thanh.'], a: 2 },            { q: 'Để thay đổi thời gian hiển thị của một bức ảnh trong video, em cần điều chỉnh thông số nào?', o: ['A. Motion.', 'B. Filters.', 'C. Duration.', 'D. Text.'], a: 2 },            { q: 'Hiệu ứng nào giúp hình ảnh trong video có sự chuyển động như phóng to hoặc thu nhỏ?', o: ['A. Motion.', 'B. 3D Effects.', 'C. Filters.', 'D. Speed.'], a: 0 },            { q: 'Khi biên tập âm thanh cho video, ta có thể thực hiện thao tác nào sau đây?', o: ['A. Chỉ chèn được một bản nhạc duy nhất cho cả video.', 'B. Không thể xóa bỏ âm thanh gốc của video clip.', 'C. Thay đổi màu sắc của sóng âm thanh.', 'D. Điều chỉnh âm lượng, thêm nhạc nền hoặc lời thuyết minh.'], a: 3 },            { q: 'Thao tác "Trim" đối với một đoạn video clip có tác dụng gì?', o: ['A. Chia đoạn video thành hai phần độc lập.', 'B. Cắt bỏ một phần ở đầu hoặc cuối đoạn video để lấy đoạn cần thiết.', 'C. Thay đổi tốc độ phát của video.', 'D. Thêm hiệu ứng 3D vào video.'], a: 1 },            { q: 'Mục đích của việc thêm "Title card" vào video là gì?', o: ['A. Để chèn nhạc nền.', 'B. Để kết nối Internet cho video.', 'C. Để tạo các trang chữ giới thiệu tiêu đề hoặc nội dung chính.', 'D. Để lưu dự án vào máy tính.'], a: 2 },            { q: 'Sau khi hoàn thành việc biên tập, lệnh nào dùng để tạo ra tệp video thành phẩm (thường có đuôi .mp4)?', o: ['A. Save Project.', 'B. New Project.', 'C. Add files.', 'D. Finish video (hoặc Export).'], a: 3 },            { q: 'Bước đầu tiên trong quy trình "Các bước giải bài toán bằng máy tính" là gì?', o: ['A. Tìm thuật toán.', 'B. Xác định bài toán.', 'C. Viết chương trình.', 'D. Chạy thử và hiệu chỉnh.'], a: 1 },            { q: 'Xác định bài toán là việc xác định các yếu tố nào?', o: ['A. Dữ liệu vào (Input) và dữ liệu ra (Output).', 'B. Thuật toán và ngôn ngữ lập trình.', 'C. Lỗi cú pháp và lỗi logic.', 'D. Tên chương trình và người viết.'], a: 0 },            { q: 'Thuật toán được định nghĩa là gì?', o: ['A. Là một ngôn ngữ lập trình cụ thể như Python hay Scratch.', 'B. Là kết quả cuối cùng sau khi chạy chương trình.', 'C. Là phần cứng của máy tính.', 'D. Là dãy các chỉ dẫn rõ ràng để từ Input tìm được Output sau một số hữu hạn bước.'], a: 3 },            { q: 'Khi giải một bài toán trên máy tính, nếu thuật toán sai thì kết quả sẽ như thế nào?', o: ['A. Máy tính sẽ tự động sửa lỗi.', 'B. Chương trình vẫn chạy đúng nếu máy tính hiện đại.', 'C. Kết quả thu được sẽ không chính xác (sai logic).', 'D. Không thể viết được chương trình.'], a: 2 },            { q: 'Tại sao cần phải "Chạy thử và hiệu chỉnh" chương trình?', o: ['A. Để phát hiện và sửa các lỗi (nếu có), đảm bảo chương trình chạy đúng với các bộ dữ liệu khác nhau.', 'B. Để làm cho chương trình đẹp hơn.', 'C. Vì đây là quy định bắt buộc của ngôn ngữ lập trình.', 'D. Để máy tính hoạt động nhanh hơn.'], a: 0 },            { q: 'Một bài toán có thể có bao nhiêu thuật toán để giải?', o: ['A. Chỉ duy nhất một thuật toán.', 'B. Không cần thuật toán nào.', 'C. Có thể có nhiều thuật toán khác nhau, cần chọn thuật toán tối ưu.', 'D. Luôn luôn có hai thuật toán.'], a: 2 },            { q: 'Công cụ nào thường được dùng để mô tả thuật toán một cách trực quan trước khi viết chương trình?', o: ['A. Sơ đồ khối.', 'B. Đoạn phim ngắn.', 'C. Bảng tính Excel.', 'D. Trang trình chiếu PowerPoint.'], a: 0 },            { q: 'Việc "Dùng máy tính để giải quyết bài toán" mang lại lợi ích gì chính?', o: ['A. Luôn luôn miễn phí.', 'B. Tăng tốc độ tính toán, xử lí được lượng dữ liệu lớn và hạn chế sai sót của con người.', 'C. Thay thế hoàn toàn con người trong việc suy nghĩ.', 'D. Chỉ dùng để giải các bài toán cộng trừ đơn giản.'], a: 1 },            { q: 'Để tạo hiệu ứng 3D cho video trong phần mềm Video Editor, em chọn biểu tượng nào?', o: ['A. Filters.', 'B. 3D effects.', 'C. Motion.', 'D. Speed.'], a: 1 },            { q: 'Khi thực hiện dự án làm video về một chủ đề học tập, bước "Biên tập đoạn video trong bảng phân cảnh" thuộc giai đoạn nào?', o: ['A. Chuẩn bị.', 'B. Thực hiện (Xây dựng nội dung).', 'C. Đánh giá.', 'D. Lưu trữ.'], a: 1 }        ];        // System Variables        let questions = [];        let currentSizeClass = 'size-normal';        let currentIndex = 0;        let userAnswers = new Array(20).fill(null);        let maxProgressReached = 0; // Thanh progress chỉ tăng tiến        let timerInterval;        let timeLeft = 15 * 60; // 15 minutes        // Utility: Shuffle array        function shuffleArray(array) {            let arr = [...array];            for (let i = arr.length - 1; i > 0; i--) {                const j = Math.floor(Math.random() * (i + 1));                [arr[i], arr[j]] = [arr[j], arr[i]];            }            return arr;        }        // Theme Toggle        function toggleTheme() {            const body = document.body;            if (body.getAttribute('data-theme') === 'dark') {                body.removeAttribute('data-theme');            } else {                body.setAttribute('data-theme', 'dark');            }        }        // Setup Screen        function selectSize(sizeClass, btnElement) {            currentSizeClass = sizeClass;            document.querySelectorAll('.size-options .btn').forEach(btn => btn.classList.remove('selected'));            btnElement.classList.add('selected');        }        // Start System        function startSystem() {            // Apply size            const app = document.getElementById('app');            app.className = `app-container ${currentSizeClass}`;                        // Shuffle questions            questions = shuffleArray(rawQuestions);                        // Reset state            currentIndex = 0;            maxProgressReached = 0;            userAnswers = new Array(questions.length).fill(null);                        // UI Switch            switchScreen('quizScreen');            document.getElementById('timerDisplay').style.display = 'block';                        // Start Timer & Render            startTimer();            renderQuestion();            updateProgress();        }        function switchScreen(screenId) {            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));            document.getElementById(screenId).classList.add('active');        }        // Render Question        function renderQuestion() {            const qData = questions[currentIndex];            document.getElementById('questionText').innerHTML = `<strong>Câu ${currentIndex + 1}/${questions.length}:</strong> ${qData.q}`;                        const optionsHtml = qData.o.map((opt, index) => {                const isSelected = userAnswers[currentIndex] === index ? 'selected' : '';                return `<div class="option ${isSelected}" onclick="chooseOption(${index})">${opt}</div>`;            }).join('');                        document.getElementById('optionsContainer').innerHTML = optionsHtml;            // Nav Buttons visibility            document.getElementById('btnPrev').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';                        if (currentIndex === questions.length - 1) {                document.getElementById('btnNext').style.display = 'none';                document.getElementById('btnSubmit').style.display = 'inline-block';            } else {                document.getElementById('btnNext').style.display = 'inline-block';                document.getElementById('btnSubmit').style.display = 'none';            }        }        // Handle Option Selection        function chooseOption(optionIndex) {            userAnswers[currentIndex] = optionIndex;            renderQuestion(); // Re-render to show selected state        }        // Navigation        function nextQuestion() {            if (currentIndex < questions.length - 1) {                currentIndex++;                if(currentIndex > maxProgressReached) {                    maxProgressReached = currentIndex;                    updateProgress();                }                renderQuestion();            }        }        function prevQuestion() {            if (currentIndex > 0) {                currentIndex--;                renderQuestion();            }        }        function updateProgress() {            // Progress only moves forward based on max question reached            const percentage = ((maxProgressReached + 1) / questions.length) * 100;            document.getElementById('progressBar').style.width = `${percentage}%`;        }        // Timer Logic        function startTimer() {            clearInterval(timerInterval);            timerInterval = setInterval(() => {                timeLeft--;                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');                const s = (timeLeft % 60).toString().padStart(2, '0');                document.getElementById('timerDisplay').innerText = `${m}:${s}`;                if (timeLeft <= 0) {                    clearInterval(timerInterval);                    submitQuiz();                }            }, 1000);        }        // Submit Logic        function submitQuiz() {            clearInterval(timerInterval);            document.getElementById('timerDisplay').style.display = 'none';            document.getElementById('progressBar').style.width = '100%';            let score = 0;            questions.forEach((q, idx) => {                if (userAnswers[idx] === q.a) score++;            });            document.getElementById('scoreDisplay').innerText = `${score} / ${questions.length}`;            switchScreen('resultScreen');        }        // Review Logic        function showReview() {            switchScreen('reviewScreen');                        const reviewHtml = questions.map((q, qIndex) => {                const userAnswer = userAnswers[qIndex];                const correct = q.a;                                const optionsHtml = q.o.map((opt, oIndex) => {                    let cssClass = 'review-option';                    let icon = '';                                        if (oIndex === correct) {                        cssClass += ' correct';                        icon = ' ✅ (Đáp án đúng)';                    } else if (oIndex === userAnswer && userAnswer !== correct) {                        cssClass += ' wrong';                        icon = ' ❌ (Bạn chọn)';                    } else if (oIndex === userAnswer && userAnswer === correct) {                        icon = ' ⭐ (Bạn chọn đúng)';                    }                    return `<div class="${cssClass}">${opt}${icon}</div>`;                }).join('');                return `                    <div class="review-item">                        <h3>Câu ${qIndex + 1}: ${q.q}</h3>                        ${userAnswer === null ? '<p style="color:#dc3545; font-size:0.9rem; margin-bottom: 5px;">⚠️ Bạn chưa trả lời câu này</p>' : ''}                        ${optionsHtml}                    </div>                `;            }).join('');            document.getElementById('reviewList').innerHTML = reviewHtml;        }    </script></body></html>
